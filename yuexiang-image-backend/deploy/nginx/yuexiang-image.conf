server {
  listen 80;
  server_name img.yuexiang.com;

  client_max_body_size 500m;

  location = /_yuexiang_origin_auth {
    internal;
    proxy_pass http://127.0.0.1:8080/api/v1/internal/image-auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Original-Referer $http_referer;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /i/ {
    auth_request /_yuexiang_origin_auth;
    error_page 401 403 404 =200 /_yuexiang_protect.svg;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /_yuexiang_protect.svg {
    default_type image/svg+xml;
    return 200 '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#06202a"/><text x="80" y="300" fill="#ecfeff" font-size="72" font-family="sans-serif" font-weight="800">悦享保护图</text><text x="84" y="370" fill="#67e8f9" font-size="32" font-family="sans-serif">Yuexiang Image Security</text></svg>';
  }
}

