services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-yuexiang}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-yuexiang_image}?sslmode=disable
      REDIS_ADDR: redis:6379
      QUEUE_DRIVER: redis
      QUEUE_STREAM: yuexiang:image:tasks
      QUEUE_DEAD_LETTER_STREAM: yuexiang:image:tasks:dead
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-yuexiang-images}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/yuexiang-worker"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-yuexiang}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-yuexiang_image}?sslmode=disable
      REDIS_ADDR: redis:6379
      QUEUE_DRIVER: redis
      QUEUE_STREAM: yuexiang:image:tasks
      QUEUE_DEAD_LETTER_STREAM: yuexiang:image:tasks:dead
      QUEUE_GROUP: yuexiang-image-workers
      WORKER_NAME: worker-prod-1
      WORKER_RETRY_LIMIT: 5
      WORKER_CLAIM_IDLE: 2m
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-yuexiang-images}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yuexiang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-yuexiang_image}
    volumes:
      - yx_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yuexiang} -d ${POSTGRES_DB:-yuexiang_image}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - yx_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - yx_minio:/data
    restart: unless-stopped

  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${S3_BUCKET:-yuexiang-images};
      mc anonymous set none local/${S3_BUCKET:-yuexiang-images};
      "

volumes:
  yx_postgres:
  yx_redis:
  yx_minio:
