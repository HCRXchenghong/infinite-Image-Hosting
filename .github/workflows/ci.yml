name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yuexiang-image-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: yuexiang-image-backend/go.mod
          cache-dependency-path: yuexiang-image-backend/go.sum
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [yuexiang-image-user-web, yuexiang-image-admin-web]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose -f docker-compose.full.yml config >/tmp/yuexiang-compose-full.out
